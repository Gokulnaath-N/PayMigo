version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: paymigo-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-paymigo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-paymigo_secure_pwd_2024}
      POSTGRES_DB: ${DB_NAME:-paymigo_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-paymigo} -d ${DB_NAME:-paymigo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paymigo-network
    restart: unless-stopped

  # Node.js Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paymigo-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${DB_USER:-paymigo}:${DB_PASSWORD:-paymigo_secure_pwd_2024}@postgres:5432/${DB_NAME:-paymigo_db}
      PORT: 5000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      ML_SERVICE_URL: http://ml-service:8000
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - paymigo-network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./Paymigo_Frontend/web
      dockerfile: Dockerfile
    container_name: paymigo-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
      VITE_ML_SERVICE_URL: ${VITE_ML_SERVICE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - paymigo-network
    restart: unless-stopped

  # Python ML Services
  ml-service:
    build:
      context: ./ml-services/ML-Service
      dockerfile: Dockerfile
    container_name: paymigo-ml-service
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      BACKEND_URL: http://backend:5000
    volumes:
      - ./ml-services/ML-Service:/app
      - ./ml-services/ML-Service/app:/app/app
    ports:
      - "8000:8000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - paymigo-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  paymigo-network:
    driver: bridge
